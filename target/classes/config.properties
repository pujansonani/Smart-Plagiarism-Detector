# Plagiarism Detector Configuration

# ==================== Algorithm Settings ====================
# Algorithm weights (must sum to 1.0)
algorithm.cosine.weight=0.35
algorithm.levenshtein.weight=0.25
algorithm.ngram.weight=0.25
algorithm.semantic.weight=0.15

# ==================== Similarity Thresholds ====================
# Score thresholds for plagiarism detection
plagiarism.threshold.critical=0.80
plagiarism.threshold.high=0.60
plagiarism.threshold.medium=0.40
plagiarism.threshold.low=0.00

# Minimum similarity for suspicious segment detection
plagiarism.segment.min.similarity=0.70

# Minimum text length for segment analysis (characters)
plagiarism.segment.min.length=50

# ==================== Text Processing ====================
# Enable stop word removal
text.preprocessing.remove.stopwords=true

# Enable text normalization
text.preprocessing.normalize=true

# Enable lemmatization
text.preprocessing.lemmatize=false

# ==================== GUI Settings ====================
# Window dimensions
gui.window.width=1400
gui.window.height=900

# Enable detailed results visualization
gui.results.detailed=true

# Maximum segments to display
gui.display.max.segments=5

# ==================== Performance Settings ====================
# Maximum analysis time in milliseconds (0 = no limit)
performance.max.analysis.time=5000

# Thread pool size for batch processing
performance.thread.pool.size=4

# ==================== Report Settings ====================
# Report output format options
report.formats=HTML,TEXT,JSON

# Default report output directory
report.output.directory=./reports/

# ==================== Logging ====================
# Log level: DEBUG, INFO, WARN, ERROR
logging.level=INFO

# Enable file logging
logging.file.enabled=true

# Log file directory
logging.file.directory=./logs/

# ==================== File Processing ====================
# Supported file extensions
file.supported.extensions=txt,pdf,doc,docx,odt

# Maximum file size in MB
file.max.size=50

# Text encoding
file.encoding=UTF-8

# ==================== Feature Extraction ====================
# Extract advanced writing style features
features.extract.style=true

# Extract readability metrics
features.extract.readability=true

# Extract keyword statistics
features.extract.keywords=true

# ==================== Advanced Options ====================
# Enable semantic analysis
analysis.semantic.enabled=true

# Enable batch processing features
analysis.batch.enabled=true

# Cross-comparison of multiple documents
analysis.cross.comparison.enabled=true

# Save analysis cache
analysis.cache.enabled=false

# ==================== Debug Options ====================
# Enable debug mode
debug.enabled=false

# Print detailed algorithm steps
debug.show.algorithm.steps=false

# Verbose logging
debug.verbose=false
